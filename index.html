<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Red Ball🎱GameZone</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎱</text></svg>">
  
<style>
body{
font-family:Arial;
margin:0;
color:white;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
url("https://images.unsplash.com/photo-1511512578047-dfb367046420");
background-size:cover;
background-position:center;
}

h1{
margin-top:30px;
font-size:38px;
color:#6ed8ff;
text-shadow:0 0 10px #6ed8ff,0 0 20px #ff4de1;
}

.sections-wrapper{
max-width:1100px;
margin:auto;
padding:10px;
}

.top-sections{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:700px){
.top-sections{
grid-template-columns:1fr;
}
}

.section{
margin:20px 0;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:16px;
padding:10px;
}

/* 🔥 חדש — שתיה קלה בשורה אחת */
.drinks-row .grid{
flex-wrap:nowrap;
justify-content:center;
}

.card{
width:180px;
background:#161616;
border:1px solid #333;
border-radius:12px;
padding:14px;
transition:0.2s;
}

.card.active{
box-shadow:0 0 12px white,0 0 20px #6ed8ff;
border:1px solid #6ed8ff;
}

.title{font-size:15px;}
.price{font-size:12px;color:#ff6bf2;}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

.btn{
background:#222;
border:1px solid #555;
color:white;
width:32px;
height:32px;
border-radius:6px;
cursor:pointer;
font-size:18px;
}

.qty{
font-size:18px;
color:#6ed8ff;
width:30px;
}

.total{
font-size:30px;
margin-top:20px;
color:#6ed8ff;
text-shadow:0 0 10px #6ed8ff,0 0 20px #ff4de1;
}

button.main{
background:#ff4de1;
border:none;
padding:10px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
color:white;
min-width:90px;
}

.tip-active{
box-shadow:0 0 12px white,0 0 20px #6ed8ff;
border:1px solid #6ed8ff;
}

#orderPanel{
position:fixed;
right:10px;
top:120px;
width:240px;
background:#111;
border:1px solid #444;
border-radius:10px;
padding:10px;
text-align:right;
direction:rtl;
}

.orderItem{
border-bottom:1px solid #333;
padding:4px 0;
}

.footer{
margin-top:60px;
font-size:12px;
opacity:0.7;
direction:rtl;
}
</style>
</head>

<body>

<h1>🎳🎱 Red Ball 🎱🎳</h1>

<div id="orderPanel">
<h3>הזמנה</h3>
<div id="orderList"></div>
<hr style="border:1px solid #333;margin:10px 0;">
<div id="orderSummary"></div>
</div>

<div id="menu"></div>

<div>
<h3>טיפ</h3>
<button class="main tip-btn" onclick="setTipPercent(0,this)">0%</button>
<button class="main tip-btn" onclick="setTipPercent(5,this)">5%</button>
<button class="main tip-btn" onclick="setTipPercent(10,this)">10%</button>
<button class="main tip-btn" onclick="setTipPercent(20,this)">20%</button>
</div>

<div class="total" id="total">סה"כ: 0</div>

<div>
<button class="main" onclick="copyOrder()">העתק לקבלה</button>
<button class="main" onclick="copyFullOrder()">העתק להתפקדות</button>
<button class="main" onclick="resetAll()">איפוס</button>
</div>

<div class="footer">
כל הזכויות שמורות ל-Messineo על בניית האפליקציה
<br><br><br><br>
</div>

<script>

const menuData={

"משחקים":[
{name:"שולחן סנוקר",price:1000},
{name:"מסלול באולינג",price:1000}
],

"מבצעים":[
{name:"מבצע שתיה קלה (10)",price:1000},
{name:"מבצע נקניקיה (10)",price:1000},
],

"שתיה קלה":[
{name:"מיץ פירות",price:200},
{name:"ברד",price:200},
{name:"לימונדה",price:200}
],

"אוכל":[
{name:"נקניקיה",price:200}
],

"שתיה חריפה":[
{name:"וודקה רדבול",price:1000},
{name:"ויסקי קולה",price:1000},
{name:"טקילה",price:1000},
{name:"גין טוניק",price:1000},
{name:"מוחיטו",price:1000},
{name:"פינה קולדה",price:1000},
{name:"מרטיני תפוחים",price:1000},
{name:"מרטיני לבן",price:1000}
],

"צייסרים ובירות":[
{name:"בירה",price:600},
{name:"שוט ויסקי",price:600},
{name:"שוט וודקה",price:600},
{name:"שוט ייאגר",price:600},
],

"בקבוקים":[
{name:"ויסקי",price:1600},
{name:"רום",price:1600},
{name:"וודקה",price:1600},
{name:"ייגרמייסטר",price:1600}
],

}

let cart={}
let tipPercent=0

function calculateTotals(){

let subtotal=0
let softQty=0
let foodQty=0

menuData["שתיה קלה"].forEach(i=>softQty+=cart[i.name])
menuData["אוכל"].forEach(i=>foodQty+=cart[i.name])

subtotal+=Math.floor(softQty/10)*1000
subtotal+=(softQty%10)*200

subtotal+=Math.floor(foodQty/10)*1000
subtotal+=(foodQty%10)*200

for(let category in menuData){
if(category==="שתיה קלה" || category==="אוכל") continue
menuData[category].forEach(item=>{
subtotal+=cart[item.name]*item.price
})
}

let tip=subtotal*(tipPercent/100)
let total=subtotal+tip

return {
subtotal:Math.round(subtotal),
tip:Math.round(tip),
total:Math.round(total)
}

}

const container=document.getElementById("menu")

const wrapper=document.createElement("div")
wrapper.className="sections-wrapper"

const topSections=document.createElement("div")
topSections.className="top-sections"

const middleSections=document.createElement("div")
middleSections.className="top-sections"

const bottomSections=document.createElement("div")

for(let category in menuData){

let section=document.createElement("div")

if(category==="שתיה קלה"){
section.className="section drinks-row"
}else{
section.className="section"
}

section.innerHTML=`<h2>${category}</h2><div class="grid"></div>`

let grid=section.querySelector(".grid")

menuData[category].forEach(item=>{
cart[item.name]=0

let card=document.createElement("div")
card.className="card"
card.id="card_"+item.name

card.innerHTML=`
<div class="title">${item.name}</div>
<div class="price">₪${item.price}</div>
<div class="controls">
<button class="btn" onclick="changeQty('${item.name}',-1)">-</button>
<div class="qty" id="${item.name}">0</div>
<button class="btn" onclick="changeQty('${item.name}',1)">+</button>
</div>`

grid.appendChild(card)
})

if(category==="משחקים" || category==="מבצעים"){
topSections.appendChild(section)

}else if(category==="שתיה קלה" || category==="אוכל"){
middleSections.appendChild(section)

}else{
bottomSections.appendChild(section)
}

}

wrapper.appendChild(topSections)
wrapper.appendChild(middleSections)
wrapper.appendChild(bottomSections)
container.appendChild(wrapper)

function setTipPercent(p,btn){
tipPercent=p
document.querySelectorAll(".tip-btn").forEach(b=>b.classList.remove("tip-active"))
btn.classList.add("tip-active")
updateTotal()
}

function changeQty(name,amount){
cart[name]+=amount
if(cart[name]<0)cart[name]=0
document.getElementById(name).innerText=cart[name]

let card=document.getElementById("card_"+name)
if(cart[name]>0){card.classList.add("active")}
else{card.classList.remove("active")}

updateTotal()
}

function updateTotal(){
let calc=calculateTotals()
document.getElementById("total").innerText="סה\"כ: "+calc.total
updateOrderPanel(calc)
}

function updateOrderPanel(calc){

let panel=document.getElementById("orderList")
panel.innerHTML=""

for(let item in cart){
if(cart[item]>0){
let div=document.createElement("div")
div.className="orderItem"
div.innerText=item+" x"+cart[item]
panel.appendChild(div)
}
}

document.getElementById("orderSummary").innerHTML=`
סיכום ביניים: ₪${calc.subtotal}<br>
טיפ: ₪${calc.tip}<br>
<b>לתשלום: ₪${calc.total}</b>
`

}

function resetAll(){
for(let item in cart){
cart[item]=0
document.getElementById(item).innerText=0
let card=document.getElementById("card_"+item)
if(card)card.classList.remove("active")
}
tipPercent=0
document.querySelectorAll(".tip-btn").forEach(b=>b.classList.remove("tip-active"))
updateTotal()
}

function copyOrder(){

let items=[]
for(let item in cart){
if(cart[item]>0){
items.push(item+" x"+cart[item])
}
}

navigator.clipboard.writeText(items.join(", "))
alert("הקבלה הועתקה")

}

function copyFullOrder(){

let lines=[]
for(let item in cart){
if(cart[item]>0){
lines.push(item+" x"+cart[item])
}
}

let calc=calculateTotals()

let text=lines.join("\n")
text+="\n\n"
text+="סיכום ביניים: ₪"+calc.subtotal+"\n"
text+="טיפ: ₪"+calc.tip+"\n"
text+="לתשלום: ₪"+calc.total
text+="\n------------------\n"

navigator.clipboard.writeText(text)
alert("ההתפקדות הועתקה")

}

</script>

</body>
</html>
