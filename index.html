<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Red Ball🎱GameZone</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎱</text></svg>">
  
<style>
body{
font-family:Arial;
margin:0;
color:white;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
url("https://images.unsplash.com/photo-1511512578047-dfb367046420");
background-size:cover;
background-position:center;
}

h1{
margin-top:30px;
font-size:38px;
color:#6ed8ff;
text-shadow:0 0 10px #6ed8ff,0 0 20px #ff4de1;
}

.sections-wrapper{
max-width:1100px;
margin:auto;
padding:10px;
}

.top-sections{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:700px){
.top-sections{
grid-template-columns:1fr;
}
}

.section{
margin:20px 0;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:16px;
padding:10px;
}

.drinks-row .grid{
flex-wrap:nowrap;
justify-content:center;
}

.card{
width:180px;
background:#161616;
border:1px solid #333;
border-radius:12px;
padding:14px;
transition:0.2s;
}

.card.active{
box-shadow:0 0 12px white,0 0 20px #6ed8ff;
border:1px solid #6ed8ff;
}

.title{font-size:15px;}
.price{font-size:12px;color:#ff6bf2;}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

.btn{
background:#222;
border:1px solid #555;
color:white;
width:32px;
height:32px;
border-radius:6px;
cursor:pointer;
font-size:18px;
}

.qty{
font-size:18px;
color:#6ed8ff;
width:30px;
}

.total{
font-size:30px;
margin-top:20px;
color:#6ed8ff;
text-shadow:0 0 10px #6ed8ff,0 0 20px #ff4de1;
}

button.main{
background:#ff4de1;
border:none;
padding:10px 18px;
margin:6px;
border-radius:8px;
cursor:pointer;
color:white;
min-width:90px;
}

.tip-active{
box-shadow:0 0 12px white,0 0 20px #6ed8ff;
border:1px solid #6ed8ff;
}

#orderPanel{
position:fixed;
right:10px;
top:120px;
width:240px;
background:#111;
border:1px solid #444;
border-radius:10px;
padding:10px;
text-align:right;
direction:rtl;
}

.orderItem{
border-bottom:1px solid #333;
padding:4px 0;
}

.footer{
margin-top:60px;
font-size:12px;
opacity:0.7;
direction:rtl;
}
</style>
</head>

<body>

<h1>🎳🎱 Red Ball 🎱🎳</h1>

<div id="orderPanel">
<h3>הזמנה</h3>
<div id="orderList"></div>
<hr style="border:1px solid #333;margin:10px 0;">
<div id="orderSummary"></div>
</div>

<div id="menu"></div>

<div>
<h3>טיפ</h3>
<button class="main tip-btn" onclick="setTipPercent(0,this)">0%</button>
<button class="main tip-btn" onclick="setTipPercent(5,this)">5%</button>
<button class="main tip-btn" onclick="setTipPercent(10,this)">10%</button>
<button class="main tip-btn" onclick="setTipPercent(20,this)">20%</button>
</div>

<div class="total" id="total">סה"כ: 0</div>

<div>
<button class="main" onclick="copyOrder()">העתק לקבלה</button>
<button class="main" onclick="copyFullOrder()">העתק להתפקדות</button>
<button class="main" onclick="resetAll()">איפוס</button>
</div>

<div class="footer">
כל הזכויות שמורות ל-Messineo על בניית האפליקציה
<br><br><br><br>
</div>

<script>

/* === הכל אותו דבר עד כאן === */
/* קיצרתי כאן כדי להתמקד רק בשינויים */

/* 🔥 שינוי 1 */
function updateOrderPanel(calc){

let panel=document.getElementById("orderList")
panel.innerHTML=""

for(let item in cart){
if(cart[item]>0){
let div=document.createElement("div")
div.className="orderItem"
div.innerText=item+" x"+cart[item]
panel.appendChild(div)
}
}

let summary=""

if(calc.tip === 0){
summary = `<b>לתשלום: ₪${calc.total}</b>`
}else{
summary = `
סיכום ביניים: ₪${calc.subtotal}<br>
טיפ: ₪${calc.tip}<br>
<b>לתשלום: ₪${calc.total}</b>
`
}

document.getElementById("orderSummary").innerHTML=summary
}

/* 🔥 שינוי 2 */
function copyFullOrder(){

let lines=[]
for(let item in cart){
if(cart[item]>0){
lines.push(item+" x"+cart[item])
}
}

let calc=calculateTotals()
let text=lines.join("\n")+"\n\n"

if(calc.tip === 0){
text += "לתשלום: ₪"+calc.total
}else{
text += "סיכום ביניים: ₪"+calc.subtotal+"\n"
text += "טיפ: ₪"+calc.tip+"\n"
text += "לתשלום: ₪"+calc.total
}

text += "\n------------------\n"

navigator.clipboard.writeText(text)
alert("ההתפקדות הועתקה")
}

</script>

</body>
</html>
